name: CI

on:
  push:
    branches: [ "main" ] 

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Add x86_64 target (macOS ARM)
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}

      - name: Clippy
        run: cargo clippy --release --all-targets

      # `make tests` fetches the password-protected test bundle (sample binaries
      # + non-redistributable Windows DLLs) from the test-data release, then runs
      # the suite. Publish test.zip on the mwemuorg/libmwemu release first.
      - name: Run tests
        run: make tests
